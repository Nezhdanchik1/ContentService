spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:./ContentService/.env[.properties]
spring.application.name=ContentService

server.port=${CONTENT_SERVICE_PORT:8083}

# DB: ContentService/.env (DB_URL) or monorepo .env (CONTENT_DB_PORT / CONTENT_DB_NAME)
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.url=${DB_URL:jdbc:postgresql://${CONTENT_DB_HOST:localhost}:${CONTENT_DB_PORT:5444}/${CONTENT_DB_NAME:content_db}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:${RABBITMQ_DEFAULT_USER:guest}}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS:guest}}

# Do not fail HTTP requests when RabbitMQ is temporarily unavailable
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000ms
spring.rabbitmq.template.retry.max-retries=3