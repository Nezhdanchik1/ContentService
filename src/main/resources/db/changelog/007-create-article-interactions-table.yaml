databaseChangeLog:
  - changeSet:
      id: 007-create-article-interactions
      author: mykty
      changes:
        - createTable:
            tableName: article_interactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: article_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_article_interaction__article
                    references: articles(id)
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: interaction_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_article_interactions_article_id
            tableName: article_interactions
            columns:
              - column:
                  name: article_id
        - createIndex:
            indexName: idx_article_interactions_created_at
            tableName: article_interactions
            columns:
              - column:
                  name: created_at
