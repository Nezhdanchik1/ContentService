databaseChangeLog:
  - changeSet:
      id: 006-create-wiki-sections
      author: content-service
      changes:
        - createTable:
            tableName: wiki_sections
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: room_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: order_index
                  type: INT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 006-add-section-id-to-wiki-entries
      author: content-service
      changes:
        - addColumn:
            tableName: wiki_entries
            columns:
              - column:
                  name: section_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: wiki_entries
            baseColumnNames: section_id
            referencedTableName: wiki_sections
            referencedColumnNames: id
            constraintName: fk_wiki_entry_section
            onDelete: SET NULL
